<section class="deals-page">
  @if (listVm$ | async; as vm) {
    <mat-card class="deals-page__card" appearance="outlined">
      <mat-card-header class="deals-page__card-header">
        <mat-card-title>Deals</mat-card-title>
        <mat-card-subtitle>Search and compare opportunities</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content class="deals-page__card-content">
        <form
          [formGroup]="filterForm"
          class="deals-page__filters"
          role="search"
          aria-label="Filter deals"
          (ngSubmit)="$event.preventDefault()"
        >
          <mat-form-field class="deals-page__field deals-page__field--search" appearance="outline" subscriptSizing="dynamic">
            <mat-label>Search by name</mat-label>
            <input matInput type="search" formControlName="search" autocomplete="off" />
          </mat-form-field>
          <mat-form-field class="deals-page__field" appearance="outline" subscriptSizing="dynamic">
            <mat-label>Min price (USD)</mat-label>
            <input
              matInput
              type="text"
              inputmode="numeric"
              formControlName="minPrice"
              placeholder="Any"
              mask="separator.0"
              thousandSeparator=","
              [allowNegativeNumbers]="false"
              [keepCharacterPositions]="true"
            />
          </mat-form-field>
          <mat-form-field class="deals-page__field" appearance="outline" subscriptSizing="dynamic">
            <mat-label>Max price (USD)</mat-label>
            <input
              matInput
              type="text"
              inputmode="numeric"
              formControlName="maxPrice"
              placeholder="Any"
              mask="separator.0"
              thousandSeparator=","
              [allowNegativeNumbers]="false"
              [keepCharacterPositions]="true"
            />
          </mat-form-field>
          <button
            mat-stroked-button
            type="button"
            class="deals-page__reset-filters"
            [disabled]="!hasActiveFilters()"
            (click)="resetFilters()"
          >
            Reset Filters
          </button>
        </form>

        <app-deal-list
          [deals]="vm.rows"
          [nameSearchQuery]="vm.searchQuery"
          [emptyTitle]="vm.emptyTitle"
          [emptyHint]="vm.emptyHint"
          (editDeal)="onEditDeal($event)"
        />
      </mat-card-content>
    </mat-card>
  }
</section>
